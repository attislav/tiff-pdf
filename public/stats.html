<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENS Stats</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #f8fafc; }
    .hint { color: #64748b; font-size: 0.8rem; margin-bottom: 1.5rem; }
    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .card {
      background: #1e293b;
      border-radius: 10px;
      padding: 1.25rem;
      text-align: center;
    }
    .card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #3b82f6;
    }
    .card .label {
      color: #94a3b8;
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }
    .chart-container {
      background: #1e293b;
      border-radius: 10px;
      padding: 1.25rem;
    }
    .chart-title {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-bottom: 1rem;
    }
    .chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 160px;
    }
    .bar-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
    }
    .bar {
      width: 100%;
      background: #3b82f6;
      border-radius: 3px 3px 0 0;
      min-height: 2px;
      transition: height 0.3s;
    }
    .bar-label {
      font-size: 0.6rem;
      color: #64748b;
      margin-top: 4px;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      transform: rotate(180deg);
      max-height: 50px;
      overflow: hidden;
    }
    .bar-count {
      font-size: 0.65rem;
      color: #94a3b8;
      margin-bottom: 2px;
    }
    .empty { text-align: center; color: #64748b; padding: 3rem 0; }
    .back {
      display: inline-block;
      margin-top: 1.5rem;
      color: #3b82f6;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>JENS TIFF zu PDF - Stats</h1>
    <p class="hint">Statistiken werden lokal in deinem Browser gespeichert.</p>
    <div id="content"></div>
    <a class="back" href="/">&larr; Zurueck zum Konverter</a>
  </div>
  <script>
    const stats = JSON.parse(localStorage.getItem('tiff-pdf-stats') || '{}');
    const content = document.getElementById('content');

    const totalConv = stats.total_conversions || 0;
    const totalFiles = stats.total_files || 0;
    const totalPages = stats.total_pages || 0;
    const daily = stats.daily || {};

    if (totalConv === 0) {
      content.innerHTML = '<div class="empty">Noch keine Konvertierungen durchgefuehrt.</div>';
    } else {
      // Build last 30 days
      const days = [];
      const now = new Date();
      for (let i = 29; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        days.push([key, daily[key] || 0]);
      }
      const max = Math.max(1, ...days.map(([, v]) => v));

      content.innerHTML = `
        <div class="cards">
          <div class="card">
            <div class="value">${totalConv}</div>
            <div class="label">Konvertierungen</div>
          </div>
          <div class="card">
            <div class="value">${totalFiles}</div>
            <div class="label">Dateien</div>
          </div>
          <div class="card">
            <div class="value">${totalPages}</div>
            <div class="label">Seiten</div>
          </div>
        </div>
        <div class="chart-container">
          <div class="chart-title">Konvertierungen pro Tag (letzte 30 Tage)</div>
          <div class="chart">
            ${days.map(([day, count]) => {
              const h = Math.max(2, (count / max) * 140);
              const label = day.slice(5);
              return `<div class="bar-wrapper">
                <span class="bar-count">${count || ''}</span>
                <div class="bar" style="height:${h}px"></div>
                <span class="bar-label">${label}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
    }
  </script>
</body>
</html>
