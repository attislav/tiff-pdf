<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENS - TIFF zu PDF Konverter</title>
  <script src="https://unpkg.com/utif@3.1.0/UTIF.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 540px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #f8fafc;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .dropzone {
      border: 2px dashed #334155;
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #1e293b;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: #3b82f6;
      background: #1e3a5f;
    }
    .dropzone-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }
    .dropzone-text { color: #94a3b8; }
    .dropzone-text strong { color: #3b82f6; }
    input[type="file"] { display: none; }
    .file-list {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .file-item {
      background: #1e293b;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }
    .file-item .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .file-item .size { color: #64748b; margin-left: 1rem; flex-shrink: 0; }
    .file-item .remove {
      margin-left: 0.75rem;
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .btn {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.85rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #334155; cursor: not-allowed; }
    .progress {
      margin-top: 1rem;
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: #3b82f6;
      width: 0%;
      transition: width 0.3s;
    }
    .status {
      margin-top: 0.75rem;
      text-align: center;
      font-size: 0.9rem;
      color: #94a3b8;
      min-height: 1.4em;
    }
    .status.error { color: #ef4444; }
    .status.success { color: #22c55e; }
    .badge {
      display: inline-block;
      background: #1e3a5f;
      color: #60a5fa;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>JENS TIFF zu PDF <span class="badge">lokal</span></h1>
    <p class="subtitle">TIFF-Dateien werden direkt im Browser konvertiert. Keine Dateien werden hochgeladen. Kein Groessenlimit.</p>

    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">&#128196;</div>
      <p class="dropzone-text"><strong>Klicken</strong> oder Dateien hierher ziehen</p>
      <p class="dropzone-text" style="font-size:0.8rem; margin-top:0.5rem">.tiff / .tif &mdash; keine Groessenbeschraenkung</p>
    </div>
    <input type="file" id="fileInput" accept=".tiff,.tif,image/tiff" multiple>

    <div class="file-list" id="fileList"></div>

    <button class="btn" id="convertBtn" disabled>Konvertieren</button>

    <div class="progress" id="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const convertBtn = document.getElementById('convertBtn');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');
    const statusEl = document.getElementById('status');
    let files = [];

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

    function addFiles(newFiles) {
      for (const f of newFiles) {
        if (/\.tiff?$/i.test(f.name)) files.push(f);
      }
      renderFiles();
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function renderFiles() {
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `<span class="name">${f.name}</span><span class="size">${formatSize(f.size)}</span><button class="remove" data-i="${i}">&times;</button>`;
        fileList.appendChild(div);
      });
      convertBtn.disabled = files.length === 0;
      statusEl.textContent = '';
      statusEl.className = 'status';
    }

    fileList.addEventListener('click', e => {
      if (e.target.classList.contains('remove')) {
        files.splice(parseInt(e.target.dataset.i), 1);
        renderFiles();
      }
    });

    function setStatus(text, type) {
      statusEl.textContent = text;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    function setProgress(pct) {
      progressBar.style.width = pct + '%';
    }

    // Yield to the browser so the UI updates
    function yieldUI() {
      return new Promise(r => setTimeout(r, 0));
    }

    async function convertFiles() {
      if (files.length === 0) return;

      convertBtn.disabled = true;
      progress.style.display = 'block';
      setProgress(0);
      setStatus('Dateien werden gelesen...');

      try {
        const { PDFDocument } = PDFLib;
        const pdfDoc = await PDFDocument.create();

        let totalPages = 0;
        let processedPages = 0;

        // First pass: count total pages for progress
        const fileBuffers = [];
        for (let fi = 0; fi < files.length; fi++) {
          setStatus(`Datei ${fi + 1}/${files.length} wird gelesen...`);
          const buf = await files[fi].arrayBuffer();
          const ifds = UTIF.decode(buf);
          totalPages += ifds.length;
          fileBuffers.push({ buf, ifds });
          await yieldUI();
        }

        // Use a canvas for rendering frames
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        // Second pass: decode and add to PDF
        for (let fi = 0; fi < fileBuffers.length; fi++) {
          const { buf, ifds } = fileBuffers[fi];

          for (let pi = 0; pi < ifds.length; pi++) {
            processedPages++;
            setStatus(`Seite ${processedPages}/${totalPages} wird konvertiert...`);
            setProgress(Math.round((processedPages / totalPages) * 90));

            UTIF.decodeImage(buf, ifds[pi]);
            const rgba = UTIF.toRGBA8(ifds[pi]);
            const w = ifds[pi].width;
            const h = ifds[pi].height;

            canvas.width = w;
            canvas.height = h;
            const imageData = new ImageData(new Uint8ClampedArray(rgba), w, h);
            ctx.putImageData(imageData, 0, 0);

            // Convert to JPEG for smaller PDF size (quality 0.85)
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
            const jpgBytes = new Uint8Array(await blob.arrayBuffer());

            const jpgImage = await pdfDoc.embedJpg(jpgBytes);
            const page = pdfDoc.addPage([w, h]);
            page.drawImage(jpgImage, { x: 0, y: 0, width: w, height: h });

            await yieldUI();
          }
        }

        setStatus('PDF wird erstellt...');
        setProgress(95);
        await yieldUI();

        const pdfBytes = await pdfDoc.save();

        setProgress(100);

        // Download
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'converted.pdf';
        a.click();
        URL.revokeObjectURL(url);

        setStatus('PDF erfolgreich erstellt!', 'success');

        // Track stats (fire and forget)
        try {
          fetch('/api/stats', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ files: files.length, pages: totalPages })
          }).catch(() => {});
        } catch {}

      } catch (err) {
        console.error(err);
        setStatus('Fehler: ' + err.message, 'error');
      } finally {
        convertBtn.disabled = false;
        setTimeout(() => { progress.style.display = 'none'; }, 2000);
      }
    }

    convertBtn.addEventListener('click', convertFiles);
  </script>
</body>
</html>
