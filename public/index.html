<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENS - TIFF zu PDF Konverter</title>
  <script src="https://unpkg.com/utif@3.1.0/UTIF.js"></script>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 540px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #f8fafc;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .dropzone {
      border: 2px dashed #334155;
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #1e293b;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: #3b82f6;
      background: #1e3a5f;
    }
    .dropzone-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }
    .dropzone-text { color: #94a3b8; }
    .dropzone-text strong { color: #3b82f6; }
    input[type="file"] { display: none; }
    .file-list {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .file-item {
      background: #1e293b;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }
    .file-item .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .file-item .size { color: #64748b; margin-left: 1rem; flex-shrink: 0; }
    .file-item .remove {
      margin-left: 0.75rem;
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .btn {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.85rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #334155; cursor: not-allowed; }
    .progress {
      margin-top: 1rem;
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: #3b82f6;
      width: 0%;
      transition: width 0.3s;
    }
    .status {
      margin-top: 0.75rem;
      text-align: center;
      font-size: 0.9rem;
      color: #94a3b8;
      min-height: 1.4em;
    }
    .status.error { color: #ef4444; }
    .status.success { color: #22c55e; }
    .pdf-info {
      margin-top: 1.25rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: none;
    }
    .pdf-info h3 {
      font-size: 0.85rem;
      color: #f8fafc;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }
    .pdf-info table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .pdf-info td {
      padding: 0.3rem 0;
      vertical-align: top;
    }
    .pdf-info td:first-child {
      color: #64748b;
      width: 45%;
    }
    .pdf-info td:last-child {
      color: #e2e8f0;
      font-weight: 500;
    }
    .pdf-info .separator {
      border-top: 1px solid #334155;
      margin: 0.5rem 0;
    }
    .pdf-info .page-detail {
      background: #0f172a;
      border-radius: 6px;
      padding: 0.6rem 0.8rem;
      margin-top: 0.5rem;
      font-size: 0.78rem;
    }
    .pdf-info .page-detail summary {
      cursor: pointer;
      color: #94a3b8;
      font-size: 0.8rem;
    }
    .pdf-info .page-detail summary:hover {
      color: #e2e8f0;
    }
    .pdf-info .warn {
      color: #fbbf24;
      font-size: 0.78rem;
      margin-top: 0.5rem;
      padding: 0.4rem 0.6rem;
      background: rgba(251,191,36,0.08);
      border-radius: 6px;
    }
    .debug {
      margin-top: 1rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-family: monospace;
      font-size: 0.75rem;
      color: #94a3b8;
      max-height: 200px;
      overflow-y: auto;
      display: none;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .badge {
      display: inline-block;
      background: #1e3a5f;
      color: #60a5fa;
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>JENS TIFF zu PDF <span class="badge">lokal</span></h1>
    <p class="subtitle">TIFF-Dateien werden direkt im Browser konvertiert. Keine Dateien werden hochgeladen. Kein Groessenlimit.</p>

    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">&#128196;</div>
      <p class="dropzone-text"><strong>Klicken</strong> oder Dateien hierher ziehen</p>
      <p class="dropzone-text" style="font-size:0.8rem; margin-top:0.5rem">.tiff / .tif &mdash; keine Groessenbeschraenkung</p>
    </div>
    <input type="file" id="fileInput" accept=".tiff,.tif,image/tiff" multiple>

    <div class="file-list" id="fileList"></div>

    <button class="btn" id="convertBtn" disabled>Konvertieren</button>

    <div class="progress" id="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status" id="status"></div>
    <div class="pdf-info" id="pdfInfo"></div>
    <div class="debug" id="debug"></div>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const convertBtn = document.getElementById('convertBtn');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');
    const statusEl = document.getElementById('status');
    const debugEl = document.getElementById('debug');
    const pdfInfoEl = document.getElementById('pdfInfo');
    let files = [];

    function log(msg) {
      const ts = new Date().toLocaleTimeString();
      debugEl.style.display = 'block';
      debugEl.textContent += `[${ts}] ${msg}\n`;
      debugEl.scrollTop = debugEl.scrollHeight;
      console.log(`[TIFF-PDF] ${msg}`);
    }

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

    function addFiles(newFiles) {
      for (const f of newFiles) {
        if (/\.tiff?$/i.test(f.name)) files.push(f);
      }
      renderFiles();
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function renderFiles() {
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = `<span class="name">${f.name}</span><span class="size">${formatSize(f.size)}</span><button class="remove" data-i="${i}">&times;</button>`;
        fileList.appendChild(div);
      });
      convertBtn.disabled = files.length === 0;
      statusEl.textContent = '';
      statusEl.className = 'status';
    }

    fileList.addEventListener('click', e => {
      if (e.target.classList.contains('remove')) {
        files.splice(parseInt(e.target.dataset.i), 1);
        renderFiles();
      }
    });

    function setStatus(text, type) {
      statusEl.textContent = text;
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    function setProgress(pct) {
      progressBar.style.width = pct + '%';
    }

    // Yield to the browser so the UI updates
    function yieldUI() {
      return new Promise(r => setTimeout(r, 0));
    }

    function detectPaper(mmW, mmH) {
      const sizes = [
        [841, 1189, 'A0'], [594, 841, 'A1'], [420, 594, 'A2'],
        [297, 420, 'A3'], [210, 297, 'A4'], [148, 210, 'A5'],
        [105, 148, 'A6'], [216, 279, 'Letter'], [216, 356, 'Legal'],
      ];
      for (const [w, h, name] of sizes) {
        if ((Math.abs(mmW - w) < 5 && Math.abs(mmH - h) < 5))
          return name;
        if ((Math.abs(mmW - h) < 5 && Math.abs(mmH - w) < 5))
          return name + ' quer';
      }
      return null;
    }

    function showPdfInfo(pdfSize, pageInfos) {
      const totalPages = pageInfos.length;
      // Group pages by dimensions
      const groups = {};
      pageInfos.forEach((p, i) => {
        const key = `${p.width}x${p.height}`;
        if (!groups[key]) groups[key] = { ...p, pages: [] };
        groups[key].pages.push(i + 1);
      });

      let html = `<h3>PDF-Informationen</h3>`;
      html += `<table>`;
      html += `<tr><td>Dateigroesse</td><td>${formatSize(pdfSize)}</td></tr>`;
      html += `<tr><td>Seiten</td><td>${totalPages}</td></tr>`;
      html += `</table>`;

      for (const key of Object.keys(groups)) {
        const g = groups[key];
        const mmW = (g.width * 0.3528).toFixed(1);
        const mmH = (g.height * 0.3528).toFixed(1);
        const inW = (g.width / 72).toFixed(2);
        const inH = (g.height / 72).toFixed(2);
        const paper = detectPaper(parseFloat(mmW), parseFloat(mmH));

        html += `<div class="separator"></div>`;
        if (Object.keys(groups).length > 1) {
          html += `<div style="color:#94a3b8;font-size:0.78rem;margin-bottom:0.3rem;">Seite ${g.pages[0]}${g.pages.length > 1 ? '-' + g.pages[g.pages.length-1] : ''} (${g.pages.length}x)</div>`;
        }
        html += `<table>`;
        html += `<tr><td>Pixel</td><td>${g.width} x ${g.height} px</td></tr>`;
        html += `<tr><td>Abmessungen</td><td>${mmW} x ${mmH} mm</td></tr>`;
        html += `<tr><td></td><td>${inW} x ${inH} inch</td></tr>`;
        if (paper) {
          html += `<tr><td>Papierformat</td><td>${paper}</td></tr>`;
        }

        // DPI estimates for common print sizes
        const a4dpiW = (g.width / (210/25.4)).toFixed(0);
        const a4dpiH = (g.height / (297/25.4)).toFixed(0);
        const a3dpiW = (g.width / (297/25.4)).toFixed(0);
        const a3dpiH = (g.height / (420/25.4)).toFixed(0);
        html += `<tr><td>DPI bei A4-Druck</td><td>${a4dpiW} x ${a4dpiH}</td></tr>`;
        html += `<tr><td>DPI bei A3-Druck</td><td>${a3dpiW} x ${a3dpiH}</td></tr>`;
        html += `</table>`;

        // Warnings
        const ptW = g.width * 0.3528;
        const ptH = g.height * 0.3528;
        if (ptW > 1200 || ptH > 1200) {
          html += `<div class="warn">Hinweis: Seitengroesse ist ${mmW} x ${mmH} mm (${(ptW/1000).toFixed(1)} x ${(ptH/1000).toFixed(1)} m). Die Pixelmasse wurden 1:1 als PDF-Punkte uebernommen. Fuer den Druck auf Standardpapier sollte die Seitengroesse skaliert werden.</div>`;
        }
      }

      // Page details expandable
      if (totalPages > 1) {
        html += `<details class="page-detail"><summary>${totalPages} Seiten im Detail</summary><table style="margin-top:0.4rem">`;
        pageInfos.forEach((p, i) => {
          html += `<tr><td>Seite ${i+1}</td><td>${p.width}x${p.height} px, JPEG ${formatSize(p.jpgSize)}</td></tr>`;
        });
        html += `</table></details>`;
      }

      pdfInfoEl.innerHTML = html;
      pdfInfoEl.style.display = 'block';
    }

    async function convertFiles() {
      if (files.length === 0) return;

      debugEl.textContent = '';
      pdfInfoEl.style.display = 'none';
      convertBtn.disabled = true;
      progress.style.display = 'block';
      setProgress(0);
      setStatus('Dateien werden gelesen...');

      log('Start - ' + files.length + ' Datei(en)');
      files.forEach((f, i) => log(`  Datei ${i+1}: ${f.name} (${formatSize(f.size)})`));

      log('Pruefe Libraries...');
      log('  UTIF: ' + (typeof UTIF !== 'undefined' ? 'OK' : 'FEHLT'));
      log('  PDFLib: ' + (typeof PDFLib !== 'undefined' ? 'OK' : 'FEHLT'));

      try {
        const { PDFDocument } = PDFLib;
        const pdfDoc = await PDFDocument.create();
        log('PDF-Dokument erstellt');

        let totalPages = 0;
        let processedPages = 0;
        const pageInfos = [];

        // First pass: count total pages for progress
        const fileBuffers = [];
        for (let fi = 0; fi < files.length; fi++) {
          setStatus(`Datei ${fi + 1}/${files.length} wird gelesen...`);
          log(`Lese Datei ${fi+1}/${files.length}: ${files[fi].name}...`);
          const t0 = performance.now();
          const buf = await files[fi].arrayBuffer();
          log(`  ArrayBuffer gelesen: ${formatSize(buf.byteLength)} in ${((performance.now()-t0)/1000).toFixed(1)}s`);

          log('  UTIF.decode starten...');
          const t1 = performance.now();
          const ifds = UTIF.decode(buf);
          log(`  UTIF.decode fertig: ${ifds.length} Seite(n) in ${((performance.now()-t1)/1000).toFixed(1)}s`);

          totalPages += ifds.length;
          fileBuffers.push({ buf, ifds });
          await yieldUI();
        }

        log(`Gesamt: ${totalPages} Seite(n) aus ${files.length} Datei(en)`);

        // Use a canvas for rendering frames
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        // Second pass: decode and add to PDF
        for (let fi = 0; fi < fileBuffers.length; fi++) {
          const { buf, ifds } = fileBuffers[fi];

          for (let pi = 0; pi < ifds.length; pi++) {
            processedPages++;
            setStatus(`Seite ${processedPages}/${totalPages} wird konvertiert...`);
            setProgress(Math.round((processedPages / totalPages) * 90));

            log(`Seite ${processedPages}/${totalPages} (Datei ${fi+1}, Frame ${pi+1})...`);
            const t2 = performance.now();

            UTIF.decodeImage(buf, ifds[pi]);
            const rgba = UTIF.toRGBA8(ifds[pi]);
            const w = ifds[pi].width;
            const h = ifds[pi].height;
            log(`  Decoded: ${w}x${h} (${formatSize(rgba.length)} RGBA) in ${((performance.now()-t2)/1000).toFixed(1)}s`);

            canvas.width = w;
            canvas.height = h;
            const imageData = new ImageData(new Uint8ClampedArray(rgba), w, h);
            ctx.putImageData(imageData, 0, 0);

            // Convert to JPEG for smaller PDF size (quality 0.85)
            const t3 = performance.now();
            const jpgBlob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
            if (!jpgBlob) {
              log('  FEHLER: canvas.toBlob lieferte null!');
              throw new Error(`canvas.toBlob fehlgeschlagen bei Seite ${processedPages}`);
            }
            const jpgBytes = new Uint8Array(await jpgBlob.arrayBuffer());
            log(`  JPEG: ${formatSize(jpgBytes.length)} in ${((performance.now()-t3)/1000).toFixed(1)}s`);

            const jpgImage = await pdfDoc.embedJpg(jpgBytes);
            const page = pdfDoc.addPage([w, h]);
            page.drawImage(jpgImage, { x: 0, y: 0, width: w, height: h });
            pageInfos.push({ width: w, height: h, jpgSize: jpgBytes.length });
            log(`  PDF-Seite hinzugefuegt`);

            await yieldUI();
          }
        }

        setStatus('PDF wird erstellt...');
        setProgress(95);
        await yieldUI();

        log('PDF speichern...');
        const t4 = performance.now();
        const pdfBytes = await pdfDoc.save();
        log(`PDF fertig: ${formatSize(pdfBytes.length)} in ${((performance.now()-t4)/1000).toFixed(1)}s`);

        setProgress(100);

        // Download
        const blob = new Blob([pdfBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'converted.pdf';
        a.click();
        URL.revokeObjectURL(url);

        setStatus('PDF erfolgreich erstellt!', 'success');
        log('Download gestartet - fertig!');

        showPdfInfo(pdfBytes.length, pageInfos);

        // Track stats in localStorage
        try {
          const stats = JSON.parse(localStorage.getItem('tiff-pdf-stats') || '{}');
          stats.total_conversions = (stats.total_conversions || 0) + 1;
          stats.total_files = (stats.total_files || 0) + files.length;
          stats.total_pages = (stats.total_pages || 0) + totalPages;
          const today = new Date().toISOString().slice(0, 10);
          if (!stats.daily) stats.daily = {};
          stats.daily[today] = (stats.daily[today] || 0) + 1;
          localStorage.setItem('tiff-pdf-stats', JSON.stringify(stats));
        } catch {}

      } catch (err) {
        console.error(err);
        log(`FEHLER: ${err.message}`);
        log(`Stack: ${err.stack}`);
        setStatus('Fehler: ' + err.message, 'error');
      } finally {
        convertBtn.disabled = false;
        setTimeout(() => { progress.style.display = 'none'; }, 2000);
      }
    }

    convertBtn.addEventListener('click', convertFiles);
  </script>
</body>
</html>
