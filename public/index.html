<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JENS - TIFF zu PDF Konverter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 540px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #f8fafc;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .dropzone {
      border: 2px dashed #334155;
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #1e293b;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: #3b82f6;
      background: #1e3a5f;
    }
    .dropzone-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }
    .dropzone-text { color: #94a3b8; }
    .dropzone-text strong { color: #3b82f6; }
    input[type="file"] { display: none; }
    .file-list {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .file-item {
      background: #1e293b;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }
    .file-item .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }
    .file-item .size { color: #64748b; margin-left: 1rem; flex-shrink: 0; }
    .file-item .remove {
      margin-left: 0.75rem;
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .btn {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.85rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { background: #334155; cursor: not-allowed; }
    .progress {
      margin-top: 1rem;
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: #3b82f6;
      width: 0%;
      transition: width 0.3s;
    }
    .status {
      margin-top: 0.75rem;
      text-align: center;
      font-size: 0.9rem;
      color: #94a3b8;
      min-height: 1.4em;
    }
    .status.error { color: #ef4444; }
    .status.success { color: #22c55e; }
  </style>
</head>
<body>
  <div class="container">
    <h1>JENS TIFF zu PDF</h1>
    <p class="subtitle">TIFF-Dateien hochladen und als PDF herunterladen. Mehrseitige TIFFs werden unterstuetzt.</p>

    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">&#128196;</div>
      <p class="dropzone-text"><strong>Klicken</strong> oder Dateien hierher ziehen</p>
      <p class="dropzone-text" style="font-size:0.8rem; margin-top:0.5rem">.tiff / .tif &mdash; max 50 MB</p>
    </div>
    <input type="file" id="fileInput" accept=".tiff,.tif,image/tiff" multiple>

    <div class="file-list" id="fileList"></div>

    <button class="btn" id="convertBtn" disabled>Konvertieren</button>

    <div class="progress" id="progress">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="status" id="status"></div>
  </div>

  <script>
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const convertBtn = document.getElementById('convertBtn');
    const progress = document.getElementById('progress');
    const progressBar = document.getElementById('progressBar');
    const status = document.getElementById('status');
    let files = [];

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

    function addFiles(newFiles) {
      for (const f of newFiles) {
        if (/\.tiff?$/i.test(f.name)) files.push(f);
      }
      renderFiles();
    }

    function renderFiles() {
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'file-item';
        const sizeKB = (f.size / 1024).toFixed(1);
        div.innerHTML = `<span class="name">${f.name}</span><span class="size">${sizeKB} KB</span><button class="remove" data-i="${i}">&times;</button>`;
        fileList.appendChild(div);
      });
      convertBtn.disabled = files.length === 0;
      status.textContent = '';
      status.className = 'status';
    }

    fileList.addEventListener('click', e => {
      if (e.target.classList.contains('remove')) {
        files.splice(parseInt(e.target.dataset.i), 1);
        renderFiles();
      }
    });

    convertBtn.addEventListener('click', async () => {
      if (files.length === 0) return;
      const formData = new FormData();
      files.forEach(f => formData.append('files', f));

      convertBtn.disabled = true;
      progress.style.display = 'block';
      progressBar.style.width = '0%';
      status.textContent = 'Konvertiere...';
      status.className = 'status';

      try {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/convert');
        xhr.responseType = 'blob';

        xhr.upload.addEventListener('progress', e => {
          if (e.lengthComputable) {
            progressBar.style.width = Math.round((e.loaded / e.total) * 90) + '%';
          }
        });

        const response = await new Promise((resolve, reject) => {
          xhr.onload = () => resolve(xhr);
          xhr.onerror = () => reject(new Error('Netzwerkfehler'));
          xhr.send(formData);
        });

        progressBar.style.width = '100%';

        if (response.status !== 200) {
          const text = await response.response.text();
          let msg = 'Konvertierung fehlgeschlagen';
          try { msg = JSON.parse(text).error; } catch {}
          throw new Error(msg);
        }

        const url = URL.createObjectURL(response.response);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'converted.pdf';
        a.click();
        URL.revokeObjectURL(url);

        status.textContent = 'PDF erfolgreich erstellt!';
        status.className = 'status success';
      } catch (err) {
        status.textContent = err.message;
        status.className = 'status error';
      } finally {
        convertBtn.disabled = false;
        setTimeout(() => { progress.style.display = 'none'; }, 2000);
      }
    });
  </script>
</body>
</html>
